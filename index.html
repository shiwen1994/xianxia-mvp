<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>仙侠 · MVP</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e0a;touch-action:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#joystick-zone{position:fixed;left:0;bottom:0;width:50%;height:60%;z-index:20;touch-action:none}
#info{position:fixed;top:8px;left:50%;transform:translateX(-50%);color:#6a8a6a;font:12px monospace;text-shadow:0 0 4px #000;z-index:30;pointer-events:none;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="joystick-zone"></div>
<div id="info">灵墟秘境</div>
<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.2/dist/nipplejs.min.js"></script>
<script>
// ─── 常量 ───
const T = 32;            // 瓦片尺寸
const MW = 80, MH = 60; // 地图尺寸（瓦片数）
const SPEED = 2.4;       // 玩家速度 (像素/帧)

// ─── 画布 ───
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── 瓦片类型 ───
// 0=深草, 1=浅草, 2=路, 3=树, 4=石, 5=水, 6=深草+花
const TILE_SOLID = { 3: true, 4: true, 5: true };

// ─── 程序化地图生成 ───
const map = [];

// 简单哈希随机
function hash(x, y) {
  let h = x * 374761393 + y * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  return (h ^ (h >> 16)) & 0x7fffffff;
}

function genMap() {
  // 先铺满深草
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      map[y][x] = hash(x, y) % 5 === 0 ? 1 : 0;
    }
  }

  // 生成路径（蜿蜒的小路）
  let px = Math.floor(MW / 2), py = Math.floor(MH / 2);
  for (let i = 0; i < 600; i++) {
    if (px >= 0 && px < MW && py >= 0 && py < MH) {
      map[py][px] = 2;
      // 路宽2
      if (px + 1 < MW) map[py][px + 1] = 2;
      if (py + 1 < MH) map[py + 1][px] = 2;
    }
    const r = hash(i, 777) % 5;
    if (r === 0) px++;
    else if (r === 1) px--;
    else if (r === 2) py++;
    else if (r === 3) py--;
    // 偶尔转向
    if (hash(i, 888) % 3 === 0) {
      const r2 = hash(i, 999) % 4;
      if (r2 === 0) px++;
      else if (r2 === 1) px--;
      else if (r2 === 2) py++;
      else py--;
    }
    px = Math.max(1, Math.min(MW - 2, px));
    py = Math.max(1, Math.min(MH - 2, py));
  }

  // 放树和石头
  for (let y = 0; y < MH; y++) {
    for (let x = 0; x < MW; x++) {
      if (map[y][x] === 2) continue; // 路上不放
      // 边缘不放
      if (x === 0 || y === 0 || x === MW - 1 || y === MH - 1) continue;
      // 出生点附近不放
      const dx = x - Math.floor(MW / 2), dy = y - Math.floor(MH / 2);
      if (dx * dx + dy * dy < 25) continue;

      const r = hash(x * 3, y * 7) % 100;
      if (r < 12) map[y][x] = 3;       // 树
      else if (r < 16) map[y][x] = 4;  // 石
      else if (r < 17) map[y][x] = 5;  // 水
      else if (r < 20) map[y][x] = 6;  // 花
    }
  }

  // 确保出生点可走
  const sx = Math.floor(MW / 2), sy = Math.floor(MH / 2);
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++) {
      const ny = sy + dy, nx = sx + dx;
      if (ny >= 0 && ny < MH && nx >= 0 && nx < MW)
        map[ny][nx] = map[ny][nx] === 2 ? 2 : 0;
    }
}
genMap();

// ─── 瓦片颜色 ───
const PALETTE = {
  0: ['#1a2e1a', '#1f351f'],  // 深草（两种随机色）
  1: ['#253a20', '#2a4025'],  // 浅草
  2: ['#3a352e', '#433d35'],  // 泥路
  3: ['#0d1a0d'],             // 树底
  4: ['#3a3a3a'],             // 石头底
  5: ['#152535'],             // 水
  6: ['#1a2e1a'],             // 花底（同深草）
};

// ─── 绘制单个瓦片 ───
function drawTile(sx, sy, type, tx, ty) {
  const p = PALETTE[type];
  const ci = hash(tx, ty) % p.length;
  ctx.fillStyle = p[ci];
  ctx.fillRect(sx, sy, T, T);

  if (type === 0 || type === 1) {
    // 草地纹理 - 小草点
    const seed = hash(tx * 13, ty * 17);
    ctx.fillStyle = type === 0 ? '#243524' : '#30482d';
    for (let i = 0; i < 3; i++) {
      const gx = sx + ((seed >> (i * 4)) & 0xf) + 4;
      const gy = sy + ((seed >> (i * 4 + 2)) & 0xf) + 8;
      ctx.fillRect(gx, gy, 2, 4);
    }
  } else if (type === 2) {
    // 路纹理
    const seed = hash(tx * 7, ty * 11);
    ctx.fillStyle = '#4a4440';
    for (let i = 0; i < 2; i++) {
      const gx = sx + ((seed >> (i * 5)) & 0x1e);
      const gy = sy + ((seed >> (i * 5 + 3)) & 0x1e);
      ctx.fillRect(gx, gy, 2, 2);
    }
  } else if (type === 3) {
    // 树 - 树干 + 树冠
    // 树干
    ctx.fillStyle = '#2a1f15';
    ctx.fillRect(sx + 12, sy + 16, 8, 16);
    // 树冠（深绿圆形）
    ctx.fillStyle = '#0f2a12';
    ctx.fillRect(sx + 4, sy + 2, 24, 20);
    ctx.fillStyle = '#143018';
    ctx.fillRect(sx + 8, sy + 4, 16, 14);
    // 高光
    ctx.fillStyle = '#1a3d1e';
    ctx.fillRect(sx + 10, sy + 6, 8, 6);
  } else if (type === 4) {
    // 石头
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(sx + 6, sy + 10, 20, 16);
    ctx.fillStyle = '#555555';
    ctx.fillRect(sx + 8, sy + 12, 16, 10);
    ctx.fillStyle = '#606060';
    ctx.fillRect(sx + 10, sy + 13, 8, 4);
  } else if (type === 5) {
    // 水 - 波纹
    const t = Date.now() / 800;
    ctx.fillStyle = '#1a3040';
    for (let i = 0; i < 3; i++) {
      const wx = sx + 4 + i * 10 + Math.sin(t + tx + i) * 3;
      const wy = sy + 8 + Math.cos(t + ty + i * 2) * 4;
      ctx.fillRect(wx, wy, 6, 2);
    }
  } else if (type === 6) {
    // 花草地
    const seed = hash(tx * 19, ty * 23);
    ctx.fillStyle = '#243524';
    for (let i = 0; i < 2; i++) {
      const gx = sx + ((seed >> (i * 4)) & 0xf) + 4;
      const gy = sy + ((seed >> (i * 4 + 2)) & 0xf) + 8;
      ctx.fillRect(gx, gy, 2, 4);
    }
    // 小花
    const colors = ['#7a5a8a', '#8a6a6a', '#6a7a6a'];
    ctx.fillStyle = colors[seed % 3];
    const fx = sx + (seed & 0x1e) + 4;
    const fy = sy + ((seed >> 5) & 0x1e) + 4;
    ctx.fillRect(fx, fy, 3, 3);
    ctx.fillStyle = '#c0a0d0';
    ctx.fillRect(fx + 1, fy + 1, 1, 1);
  }
}

// ─── 玩家 ───
const player = {
  x: Math.floor(MW / 2) * T + T / 2,
  y: Math.floor(MH / 2) * T + T / 2,
  dir: 0,    // 0=下,1=左,2=上,3=右
  frame: 0,
  moving: false
};

function drawPlayer(sx, sy) {
  const bob = player.moving ? Math.sin(Date.now() / 120) * 2 : 0;
  const py = sy + bob;

  // 阴影
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(sx - 6, sy + 12, 14, 4);

  // 身体 - 修仙长袍
  ctx.fillStyle = '#3a4a5a';
  ctx.fillRect(sx - 6, py - 4, 12, 16);

  // 腰带
  ctx.fillStyle = '#6a5a3a';
  ctx.fillRect(sx - 6, py + 2, 12, 2);

  // 头
  ctx.fillStyle = '#d4b896';
  ctx.fillRect(sx - 4, py - 10, 8, 7);

  // 头发（长发/发髻风格）
  ctx.fillStyle = '#1a1a2a';
  ctx.fillRect(sx - 5, py - 12, 10, 4);
  if (player.dir !== 2) { // 非背面
    ctx.fillRect(sx - 5, py - 8, 2, 6);
    ctx.fillRect(sx + 3, py - 8, 2, 6);
  }

  // 发光灵力效果（移动时）
  if (player.moving) {
    ctx.fillStyle = `rgba(100,180,255,${0.15 + Math.sin(Date.now() / 200) * 0.1})`;
    ctx.fillRect(sx - 8, py - 14, 18, 26);
  }

  // 眼睛（非背面时）
  if (player.dir !== 2) {
    ctx.fillStyle = '#a0c0ff';
    if (player.dir === 0) { // 朝下
      ctx.fillRect(sx - 3, py - 6, 2, 2);
      ctx.fillRect(sx + 1, py - 6, 2, 2);
    } else if (player.dir === 1) { // 朝左
      ctx.fillRect(sx - 3, py - 6, 2, 2);
      ctx.fillRect(sx - 1, py - 6, 2, 2);
    } else { // 朝右
      ctx.fillRect(sx - 1, py - 6, 2, 2);
      ctx.fillRect(sx + 1, py - 6, 2, 2);
    }
  }
}

// ─── 相机 ───
const cam = { x: 0, y: 0 };

function updateCamera() {
  const tx = player.x - canvas.width / 2;
  const ty = player.y - canvas.height / 2;
  cam.x += (tx - cam.x) * 0.1;
  cam.y += (ty - cam.y) * 0.1;
  // 限制边界
  cam.x = Math.max(0, Math.min(MW * T - canvas.width, cam.x));
  cam.y = Math.max(0, Math.min(MH * T - canvas.height, cam.y));
}

// ─── 碰撞检测 ───
function isSolid(px, py) {
  const tx = Math.floor(px / T);
  const ty = Math.floor(py / T);
  if (tx < 0 || ty < 0 || tx >= MW || ty >= MH) return true;
  return !!TILE_SOLID[map[ty][tx]];
}

function canMove(nx, ny) {
  // 检测角色碰撞箱（稍小于一个瓦片）
  const hw = 5, hh = 5;
  return !isSolid(nx - hw, ny - hh) &&
         !isSolid(nx + hw, ny - hh) &&
         !isSolid(nx - hw, ny + hh) &&
         !isSolid(nx + hw, ny + hh);
}

// ─── 输入 ───
const input = { dx: 0, dy: 0 };

// 键盘
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

// 虚拟摇杆
nipplejs.create({
  zone: document.getElementById('joystick-zone'),
  mode: 'dynamic',
  color: 'rgba(100,180,255,0.3)',
  size: 100,
  restOpacity: 0.3
}).on('move', (evt, data) => {
  if (data.direction) {
    const a = data.angle.radian;
    const f = Math.min(data.force, 1);
    input.dx = Math.cos(a) * f;
    input.dy = Math.sin(a) * f;
  }
}).on('end', () => {
  input.dx = 0;
  input.dy = 0;
});

// ─── 粒子系统（灵力微光）───
const particles = [];
for (let i = 0; i < 30; i++) {
  particles.push({
    x: Math.random() * MW * T,
    y: Math.random() * MH * T,
    speed: 0.2 + Math.random() * 0.3,
    phase: Math.random() * Math.PI * 2,
    size: 1 + Math.floor(Math.random() * 2)
  });
}

function drawParticles() {
  const t = Date.now() / 1000;
  ctx.fillStyle = 'rgba(120,200,255,0.4)';
  for (const p of particles) {
    const sx = p.x - cam.x;
    const sy = p.y - cam.y + Math.sin(t * p.speed + p.phase) * 8;
    if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) continue;
    const alpha = 0.2 + Math.sin(t * 2 + p.phase) * 0.2;
    ctx.globalAlpha = alpha;
    ctx.fillRect(Math.round(sx), Math.round(sy), p.size, p.size);
  }
  ctx.globalAlpha = 1;
}

// ─── 主循环 ───
function update() {
  // 合并键盘输入
  let dx = input.dx, dy = input.dy;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;

  // 归一化
  const len = Math.sqrt(dx * dx + dy * dy);
  if (len > 0.1) {
    dx = (dx / len) * SPEED;
    dy = (dy / len) * SPEED;
    player.moving = true;

    // 朝向
    if (Math.abs(dx) > Math.abs(dy)) {
      player.dir = dx > 0 ? 3 : 1;
    } else {
      player.dir = dy > 0 ? 0 : 2;
    }

    // 分轴移动（滑墙效果）
    const nx = player.x + dx;
    const ny = player.y + dy;
    if (canMove(nx, player.y)) player.x = nx;
    if (canMove(player.x, ny)) player.y = ny;

    // 世界边界
    player.x = Math.max(T, Math.min((MW - 1) * T, player.x));
    player.y = Math.max(T, Math.min((MH - 1) * T, player.y));
  } else {
    player.moving = false;
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 背景
  ctx.fillStyle = '#0a0e0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  updateCamera();

  // 计算可视瓦片范围
  const startTX = Math.max(0, Math.floor(cam.x / T) - 1);
  const startTY = Math.max(0, Math.floor(cam.y / T) - 1);
  const endTX = Math.min(MW - 1, Math.ceil((cam.x + canvas.width) / T) + 1);
  const endTY = Math.min(MH - 1, Math.ceil((cam.y + canvas.height) / T) + 1);

  // 绘制地图
  for (let ty = startTY; ty <= endTY; ty++) {
    for (let tx = startTX; tx <= endTX; tx++) {
      const sx = Math.round(tx * T - cam.x);
      const sy = Math.round(ty * T - cam.y);
      drawTile(sx, sy, map[ty][tx], tx, ty);
    }
  }

  // 绘制粒子
  drawParticles();

  // 绘制玩家
  const px = Math.round(player.x - cam.x);
  const py = Math.round(player.y - cam.y);
  drawPlayer(px, py);

  // 简单暗角效果
  const grd = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.width * 0.3,
    canvas.width / 2, canvas.height / 2, canvas.width * 0.75
  );
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,5,0,0.5)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
