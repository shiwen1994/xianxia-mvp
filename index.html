<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>仙侠 · 灵墟秘境</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0e0a;touch-action:none}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#joystick-zone{position:fixed;left:0;bottom:0;width:50%;height:60%;z-index:20;touch-action:none}
#info{position:fixed;top:8px;left:50%;transform:translateX(-50%);color:#6a8a6a;font:12px monospace;text-shadow:0 0 4px #000;z-index:30;pointer-events:none;text-align:center}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="joystick-zone"></div>
<div id="info">灵墟秘境</div>
<script src="https://cdn.jsdelivr.net/npm/nipplejs@0.10.2/dist/nipplejs.min.js"></script>
<script>

const T = 32;
const MW = 80, MH = 60;
const SPEED = 2.8;
const TILE_SOLID = { 3: true, 4: true, 5: true };

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

function hash(x, y) {
  let h = x * 374761393 + y * 668265263;
  h = (h ^ (h >> 13)) * 1274126177;
  return (h ^ (h >> 16)) & 0x7fffffff;
}

const map = [];
function genMap() {
  for (let y = 0; y < MH; y++) {
    map[y] = [];
    for (let x = 0; x < MW; x++) {
      map[y][x] = hash(x, y) % 5 === 0 ? 1 : 0;
    }
  }
  let px = Math.floor(MW / 2), py = Math.floor(MH / 2);
  for (let i = 0; i < 600; i++) {
    if (px >= 0 && px < MW && py >= 0 && py < MH) {
      map[py][px] = 2;
      if (px + 1 < MW) map[py][px + 1] = 2;
      if (py + 1 < MH) map[py + 1][px] = 2;
    }
    const r = hash(i, 777) % 5;
    if (r === 0) px++; else if (r === 1) px--; else if (r === 2) py++; else if (r === 3) py--;
    px = Math.max(1, Math.min(MW - 2, px));
    py = Math.max(1, Math.min(MH - 2, py));
    if (hash(i, 888) % 3 === 0) {
      const r2 = hash(i, 999) % 4;
      if (r2 === 0) px++; else if (r2 === 1) px--; else if (r2 === 2) py++; else py--;
    }
    px = Math.max(1, Math.min(MW - 2, px));
    py = Math.max(1, Math.min(MH - 2, py));
  }
  const sx = Math.floor(MW / 2), sy = Math.floor(MH / 2);
  for (let y = 0; y < MH; y++) {
    for (let x = 0; x < MW; x++) {
      if (map[y][x] === 2) continue;
      if (x === 0 || y === 0 || x === MW - 1 || y === MH - 1) continue;
      const dx = x - sx, dy = y - sy;
      if (dx * dx + dy * dy < 25) continue;
      const r = hash(x * 3, y * 7) % 100;
      if (r < 12) map[y][x] = 3;
      else if (r < 16) map[y][x] = 4;
      else if (r < 17) map[y][x] = 5;
      else if (r < 20) map[y][x] = 6;
    }
  }
  const sx2 = Math.floor(MW / 2), sy2 = Math.floor(MH / 2);
  for (let dy = -1; dy <= 1; dy++)
    for (let dx = -1; dx <= 1; dx++) {
      const ny = sy2 + dy, nx = sx2 + dx;
      if (ny >= 0 && ny < MH && nx >= 0 && nx < MW)
        map[ny][nx] = map[ny][nx] === 2 ? 2 : 0;
    }
}
genMap();

const player = {
  x: Math.floor(MW / 2) * T + T / 2,
  y: Math.floor(MH / 2) * T + T / 2,
  dir: 0,
  frame: 0,
  moving: false,
  vx: 0, vy: 0
};

const cam = { x: 0, y: 0 };
function updateCamera() {
  const tx = player.x - canvas.width / 2;
  const ty = player.y - canvas.height / 2;
  cam.x += (tx - cam.x) * 0.12;
  cam.y += (ty - cam.y) * 0.12;
  cam.x = Math.max(0, Math.min(MW * T - canvas.width, cam.x));
  cam.y = Math.max(0, Math.min(MH * T - canvas.height, cam.y));
}

function isSolid(px, py) {
  const tx = Math.floor(px / T), ty = Math.floor(py / T);
  if (tx < 0 || ty < 0 || tx >= MW || ty >= MH) return true;
  return !!TILE_SOLID[map[ty][tx]];
}
function canMove(nx, ny) {
  const hw = 5, hh = 5;
  return !isSolid(nx - hw, ny - hh) && !isSolid(nx + hw, ny - hh) &&
         !isSolid(nx - hw, ny + hh) && !isSolid(nx + hw, ny + hh);
}

const input = { dx: 0, dy: 0 };
const keys = {};
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });
nipplejs.create({
  zone: document.getElementById('joystick-zone'),
  mode: 'dynamic', color: 'rgba(100,180,255,0.3)', size: 110, restOpacity: 0.3
}).on('move', (evt, data) => {
  if (data.direction) {
    input.dx = Math.cos(data.angle.radian) * Math.min(data.force, 1);
    input.dy = -Math.sin(data.angle.radian) * Math.min(data.force, 1);
  }
}).on('end', () => { input.dx = 0; input.dy = 0; });

const particles = [];
for (let i = 0; i < 30; i++) {
  particles.push({ x: Math.random() * MW * T, y: Math.random() * MH * T,
    speed: 0.2 + Math.random() * 0.3, phase: Math.random() * Math.PI * 2, size: 1 + Math.floor(Math.random() * 2) });
}

// ─── 精细瓦片渲染 ───
function drawTile(sx, sy, type, tx, ty) {
  const h = hash(tx, ty);

  if (type === 0) {
    // 深草地 - 多层
    ctx.fillStyle = '#1a2e1a'; ctx.fillRect(sx, sy, T, T);
    // 草叶层
    ctx.fillStyle = '#223822';
    for (let i = 0; i < 3; i++) {
      const gx = sx + ((h >> (i * 4)) & 0xf) + 4;
      const gy = sy + ((h >> (i * 4 + 2)) & 0xf) + 8;
      ctx.fillRect(gx, gy, 2, 5); ctx.fillRect(gx - 1, gy + 2, 1, 3);
    }
    // 高光苔藓点
    ctx.fillStyle = '#2a4028'; ctx.fillRect(sx + ((h >> 6) & 7) + 10, sy + ((h >> 9) & 7) + 4, 2, 2);
    // 深层阴影
    ctx.fillStyle = '#162216'; ctx.fillRect(sx, sy + T - 3, T, 3);

  } else if (type === 1) {
    // 浅草地
    ctx.fillStyle = '#253a20'; ctx.fillRect(sx, sy, T, T);
    ctx.fillStyle = '#2e4830';
    for (let i = 0; i < 3; i++) {
      const gx = sx + ((h >> (i * 5)) & 0x1e) + 3;
      const gy = sy + ((h >> (i * 5 + 3)) & 0x1e) + 9;
      ctx.fillRect(gx, gy, 2, 4);
    }
    ctx.fillStyle = '#3a5a38'; ctx.fillRect(sx + 14, sy + 7, 3, 3);
    ctx.fillStyle = '#1c2e18'; ctx.fillRect(sx, sy + T - 2, T, 2);

  } else if (type === 2) {
    // 泥土路 - 纹理感
    ctx.fillStyle = '#332e28'; ctx.fillRect(sx, sy, T, T);
    ctx.fillStyle = '#3e3830';
    for (let i = 0; i < 2; i++) {
      const gx = sx + ((h >> (i * 6)) & 0x1f);
      const gy = sy + ((h >> (i * 6 + 3)) & 0x1f) + 5;
      ctx.fillRect(gx, gy, 3, 2);
    }
    // 小石子
    ctx.fillStyle = '#4a4440'; ctx.fillRect(sx + 7, sy + 16, 5, 4);
    ctx.fillStyle = '#423e38'; ctx.fillRect(sx + 20, sy + 8, 4, 3);
    // 边缘
    ctx.fillStyle = '#2a2620'; ctx.fillRect(sx, sy, 2, T); ctx.fillRect(sx, sy, T, 2);

  } else if (type === 3) {
    // 树 - 精细像素
    ctx.fillStyle = '#1e2e1e'; ctx.fillRect(sx, sy, T, T);
    // 地面圈
    ctx.fillStyle = '#1a2a1a'; ctx.beginPath(); ctx.arc(sx + 16, sy + 22, 14, 0, Math.PI * 2); ctx.fill();
    // 树干
    ctx.fillStyle = '#2a1f15'; ctx.fillRect(sx + 12, sy + 14, 8, 18);
    ctx.fillStyle = '#3a2a1a'; ctx.fillRect(sx + 13, sy + 16, 3, 14);
    // 树冠 (三层)
    ctx.fillStyle = '#0a1f0a'; ctx.fillRect(sx + 2, sy + 2, 28, 18);
    ctx.fillStyle = '#0f2a0f'; ctx.fillRect(sx + 5, sy, 22, 16);
    ctx.fillStyle = '#143214'; ctx.fillRect(sx + 8, sy + 3, 16, 12);
    ctx.fillStyle = '#1a3a1a'; ctx.fillRect(sx + 11, sy + 5, 10, 8);
    // 高光
    ctx.fillStyle = '#224022'; ctx.fillRect(sx + 10, sy + 4, 6, 4);
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(sx + 6, sy + 20, 18, 5);

  } else if (type === 4) {
    // 石头 - 层次感
    ctx.fillStyle = '#1e1e1e'; ctx.fillRect(sx, sy, T, T);
    ctx.fillStyle = '#3c3c3c'; ctx.fillRect(sx + 5, sy + 8, 22, 18);
    ctx.fillStyle = '#484848'; ctx.fillRect(sx + 7, sy + 10, 18, 13);
    ctx.fillStyle = '#585858'; ctx.fillRect(sx + 9, sy + 12, 14, 8);
    ctx.fillStyle = '#606060'; ctx.fillRect(sx + 11, sy + 13, 8, 5);
    // 高光
    ctx.fillStyle = '#707070'; ctx.fillRect(sx + 11, sy + 13, 4, 3);
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(sx + 6, sy + 24, 20, 4);

  } else if (type === 5) {
    // 水 - 动态波光
    const t = Date.now() / 800;
    ctx.fillStyle = '#0f2030'; ctx.fillRect(sx, sy, T, T);
    // 波纹层1
    ctx.fillStyle = '#162840';
    for (let i = 0; i < 3; i++) {
      const wx = sx + 4 + i * 10 + Math.sin(t + tx + i) * 4;
      const wy = sy + 8 + Math.cos(t + ty + i * 2) * 5;
      ctx.fillRect(wx, wy, 8, 2);
    }
    // 高光
    ctx.fillStyle = 'rgba(60,140,200,0.2)'; ctx.fillRect(sx + 2, sy + 2, 12, 6);
    ctx.fillStyle = 'rgba(100,180,255,0.12)'; ctx.fillRect(sx + 18, sy + 14, 8, 4);
    // 波纹层2 (细线)
    ctx.fillStyle = 'rgba(80,160,220,0.15)';
    for (let i = 0; i < 2; i++) {
      const wx = sx + 6 + i * 12 + Math.cos(t * 0.7 + tx + i) * 3;
      const wy = sy + 18 + Math.sin(t * 0.7 + ty + i) * 3;
      ctx.fillRect(wx, wy, 6, 1);
    }

  } else if (type === 6) {
    // 花草地
    ctx.fillStyle = '#1a2e1a'; ctx.fillRect(sx, sy, T, T);
    ctx.fillStyle = '#223822';
    for (let i = 0; i < 2; i++) {
      const gx = sx + ((h >> (i * 6)) & 0x1f) + 4;
      const gy = sy + ((h >> (i * 6 + 3)) & 0x1f) + 8;
      ctx.fillRect(gx, gy, 2, 5);
    }
    // 小花
    const colors = ['#7a5a8a', '#8a6a7a', '#9a7a8a'];
    ctx.fillStyle = colors[h % 3];
    const fx = sx + (h & 0x1e) + 5;
    const fy = sy + ((h >> 5) & 0x1e) + 4;
    ctx.fillRect(fx, fy, 4, 4);
    ctx.fillStyle = '#c0a0d0'; ctx.fillRect(fx + 1, fy + 1, 2, 2);
    ctx.fillStyle = '#e0c0e0'; ctx.fillRect(fx + 1, fy, 2, 1);
  }
}

function drawPlayer(sx, sy) {
  const t = Date.now();
  // sy is ground level (feet position), scale 3x
  const bob = player.moving ? Math.sin(t / 100) * 3 : 0;
  const py = sy + bob; // py is the bob offset center

  // ── 阴影 (椭圆形，大型角色) ──
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.ellipse(sx, sy + 2, 10, 4, 0, 0, Math.PI * 2); ctx.fill();

  // ── 灵力气场光晕 (移动时) ──
  if (player.moving) {
    const pulse = 0.1 + Math.sin(t / 200) * 0.05;
    ctx.fillStyle = 'rgba(100,180,255,' + pulse + ')';
    ctx.beginPath(); ctx.ellipse(sx, py - 30, 18, 42, 0, 0, Math.PI * 2); ctx.fill();
  }

  // ── 脚 / 鞋 ──
  ctx.fillStyle = '#1a1a2a'; // 黑布鞋
  if (player.moving) {
    const foot = Math.sin(t / 80) > 0 ? 2 : -2;
    // 左脚
    ctx.fillRect(sx - 9, sy - 4 + foot, 8, 6);
    // 右脚
    ctx.fillRect(sx + 1, sy - 4 - foot, 8, 6);
  } else {
    ctx.fillRect(sx - 9, sy - 4, 8, 6);
    ctx.fillRect(sx + 1, sy - 4, 8, 6);
  }
  // 鞋底白色
  ctx.fillStyle = '#e8e8f0';
  ctx.fillRect(sx - 9, sy + 1, 8, 1);
  ctx.fillRect(sx + 1, sy + 1, 8, 1);

  // ── 下摆 / 袍子底层 (蓝白渐变) ──
  ctx.fillStyle = '#1a2a4a'; // 深蓝底
  ctx.fillRect(sx - 10, sy - 20, 20, 18);
  ctx.fillStyle = '#2a4080'; // 中蓝
  ctx.fillRect(sx - 9, sy - 19, 18, 16);
  // 白色内衬下摆
  ctx.fillStyle = '#d8d8e8';
  ctx.fillRect(sx - 10, sy - 4, 20, 3);
  ctx.fillStyle = '#c0c0d0';
  ctx.fillRect(sx - 8, sy - 3, 16, 2);

  // ── 袍子中层 ──
  ctx.fillStyle = '#3a5a9a';
  ctx.fillRect(sx - 9, sy - 38, 18, 20);
  // 蓝色纹理线条
  ctx.fillStyle = '#4a6aaa';
  ctx.fillRect(sx - 7, sy - 36, 2, 16);
  ctx.fillRect(sx + 5, sy - 36, 2, 16);
  // 腰带上衣摆过渡
  ctx.fillStyle = '#2a3a6a';
  ctx.fillRect(sx - 9, sy - 22, 18, 5);

  // ── 腰带 ──
  ctx.fillStyle = '#1a2a5a'; // 深蓝腰带
  ctx.fillRect(sx - 9, sy - 22, 18, 4);
  ctx.fillStyle = '#6a8aca'; // 亮蓝装饰线
  ctx.fillRect(sx - 9, sy - 21, 18, 1);
  ctx.fillRect(sx - 9, sy - 19, 18, 1);
  // 腰带结
  ctx.fillStyle = '#5a7aba';
  ctx.fillRect(sx - 3, sy - 22, 6, 4);
  ctx.fillStyle = '#8aaadf';
  ctx.fillRect(sx - 2, sy - 21, 4, 2);

  // ── 袍子上层 / 胸部 ──
  ctx.fillStyle = '#4a6aaa';
  ctx.fillRect(sx - 8, sy - 50, 16, 30);
  // 白色里衣领口
  ctx.fillStyle = '#d8d8e8';
  ctx.fillRect(sx - 6, sy - 50, 12, 3);
  ctx.fillStyle = '#c8c8d8';
  ctx.fillRect(sx - 4, sy - 49, 8, 2);
  // 蓝色衣襟线
  ctx.fillStyle = '#3a5a9a';
  ctx.fillRect(sx - 1, sy - 48, 2, 24);

  // ── 袖口 ──
  ctx.fillStyle = '#3a5a9a';
  if (player.dir === 1) { // 朝左
    ctx.fillRect(sx - 16, sy - 48, 9, 22);
    ctx.fillStyle = '#4a6aaa'; ctx.fillRect(sx - 15, sy - 47, 7, 20);
    ctx.fillStyle = '#d8d8e8'; ctx.fillRect(sx - 16, sy - 28, 9, 2); // 袖口白边
  } else if (player.dir === 3) { // 朝右
    ctx.fillRect(sx + 7, sy - 48, 9, 22);
    ctx.fillStyle = '#4a6aaa'; ctx.fillRect(sx + 8, sy - 47, 7, 20);
    ctx.fillStyle = '#d8d8e8'; ctx.fillRect(sx + 7, sy - 28, 9, 2);
  } else { // 朝上或朝下，袖子自然下垂
    ctx.fillRect(sx - 16, sy - 48, 9, 26);
    ctx.fillRect(sx + 7, sy - 48, 9, 26);
    ctx.fillStyle = '#4a6aaa'; ctx.fillRect(sx - 15, sy - 47, 7, 24);
    ctx.fillRect(sx + 8, sy - 47, 7, 24);
    ctx.fillStyle = '#d8d8e8'; ctx.fillRect(sx - 16, sy - 24, 9, 2);
    ctx.fillRect(sx + 7, sy - 24, 9, 2);
  }

  // ── 颈部 ──
  ctx.fillStyle = '#d4b090';
  ctx.fillRect(sx - 3, sy - 55, 6, 6);
  ctx.fillStyle = '#c4a080';
  ctx.fillRect(sx - 2, sy - 54, 4, 4);

  // ── 头部 ──
  ctx.fillStyle = '#d4b090'; // 肤色
  ctx.fillRect(sx - 7, sy - 72, 14, 18);
  ctx.fillStyle = '#e4c0a0'; // 脸颊高光
  ctx.fillRect(sx - 5, sy - 68, 10, 10);

  // ── 眉毛 ──
  ctx.fillStyle = '#3a3020';
  ctx.fillRect(sx - 6, sy - 70, 5, 1);
  ctx.fillRect(sx + 1, sy - 70, 5, 1);

  // ── 眼睛 ──
  if (player.dir !== 2) { // 不朝上时可见
    ctx.fillStyle = '#2a1a10'; // 瞳孔
    if (player.dir === 0) { // 朝下
      ctx.fillRect(sx - 5, sy - 66, 3, 3);
      ctx.fillRect(sx + 2, sy - 66, 3, 3);
    } else if (player.dir === 1) { // 朝左
      ctx.fillRect(sx - 6, sy - 66, 3, 3);
      ctx.fillRect(sx - 2, sy - 66, 2, 3);
    } else { // 朝右
      ctx.fillRect(sx + 3, sy - 66, 3, 3);
      ctx.fillRect(sx - 1, sy - 66, 2, 3);
    }
    // 眼神高光
    ctx.fillStyle = '#ffffff';
    if (player.dir === 0) {
      ctx.fillRect(sx - 4, sy - 66, 1, 1);
      ctx.fillRect(sx + 3, sy - 66, 1, 1);
    } else if (player.dir === 1) {
      ctx.fillRect(sx - 5, sy - 66, 1, 1);
    } else {
      ctx.fillRect(sx + 5, sy - 66, 1, 1);
    }
  }

  // ── 鼻子 ──
  ctx.fillStyle = '#c4a080';
  ctx.fillRect(sx - 1, sy - 63, 2, 2);

  // ── 嘴 ──
  ctx.fillStyle = '#b08070';
  ctx.fillRect(sx - 2, sy - 59, 4, 1);

  // ── 耳朵 ──
  ctx.fillStyle = '#d4b090';
  ctx.fillRect(sx - 8, sy - 70, 2, 6);
  ctx.fillRect(sx + 6, sy - 70, 2, 6);

  // ── 头发 (年轻男性短发) ──
  ctx.fillStyle = '#1a1a1a'; // 黑发
  ctx.fillRect(sx - 8, sy - 80, 16, 10); // 顶部
  ctx.fillStyle = '#202020';
  ctx.fillRect(sx - 8, sy - 80, 16, 6);
  // 刘海
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(sx - 7, sy - 76, 14, 5);
  ctx.fillStyle = '#252525';
  ctx.fillRect(sx - 6, sy - 75, 12, 3);
  // 两侧鬓角
  ctx.fillRect(sx - 8, sy - 73, 2, 5);
  ctx.fillRect(sx + 6, sy - 73, 2, 5);

  // ── 蓝色发带 ──
  ctx.fillStyle = '#4a6aaa'; // 发带底
  ctx.fillRect(sx - 8, sy - 78, 16, 3);
  ctx.fillStyle = '#6a8aca'; // 发带亮
  ctx.fillRect(sx - 6, sy - 78, 12, 1);
  // 发带结 (右侧)
  ctx.fillStyle = '#4a6aaa';
  ctx.fillRect(sx + 5, sy - 78, 4, 3);
  ctx.fillStyle = '#6a8aca';
  ctx.fillRect(sx + 6, sy - 78, 2, 1);
  // 飘带
  ctx.fillStyle = 'rgba(100,140,220,0.6)';
  const windOffset = player.moving ? Math.sin(t / 150) * 2 : 0;
  ctx.fillRect(sx + 8 + windOffset, sy - 77, 5, 2);
  ctx.fillRect(sx + 10 + windOffset, sy - 75, 4, 2);
}
function drawParticles() {
  const t = Date.now() / 1000;
  for (const p of particles) {
    const sx = p.x - cam.x;
    const sy = p.y - cam.y + Math.sin(t * p.speed + p.phase) * 8;
    if (sx < -10 || sx > canvas.width + 10 || sy < -10 || sy > canvas.height + 10) continue;
    const alpha = 0.15 + Math.sin(t * 2 + p.phase) * 0.12;
    ctx.fillStyle = 'rgba(120,200,255,' + alpha + ')';
    ctx.fillRect(Math.round(sx), Math.round(sy), p.size, p.size);
  }
}

function update() {
  let dx = input.dx, dy = input.dy;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) dx = 1;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) dy = -1;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) dy = 1;

  const len = Math.sqrt(dx * dx + dy * dy);
  if (len > 0.1) {
    dx = (dx / len) * SPEED;
    dy = (dy / len) * SPEED;
    player.moving = true;

    if (Math.abs(dx) > Math.abs(dy)) { player.dir = dx > 0 ? 3 : 1; }
    else { player.dir = dy > 0 ? 0 : 2; }

    const nx = player.x + dx;
    const ny = player.y + dy;
    if (canMove(nx, player.y)) player.x = nx;
    if (canMove(player.x, ny)) player.y = ny;

    player.x = Math.max(T, Math.min((MW - 1) * T, player.x));
    player.y = Math.max(T, Math.min((MH - 1) * T, player.y));
  } else {
    player.moving = false;
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#0a0e0a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
  updateCamera();

  const sTX = Math.max(0, Math.floor(cam.x / T) - 1);
  const sTY = Math.max(0, Math.floor(cam.y / T) - 1);
  const eTX = Math.min(MW - 1, Math.ceil((cam.x + canvas.width) / T) + 1);
  const eTY = Math.min(MH - 1, Math.ceil((cam.y + canvas.height) / T) + 1);

  for (let ty = sTY; ty <= eTY; ty++) {
    for (let tx = sTX; tx <= eTX; tx++) {
      drawTile(tx * T - cam.x, ty * T - cam.y, map[ty][tx], tx, ty);
    }
  }

  drawParticles();

  const px = Math.round(player.x - cam.x);
  const py = Math.round(player.y - cam.y);
  drawPlayer(px, py);

  // 暗角
  const grd = ctx.createRadialGradient(
    canvas.width / 2, canvas.height / 2, canvas.width * 0.3,
    canvas.width / 2, canvas.height / 2, canvas.width * 0.75
  );
  grd.addColorStop(0, 'rgba(0,0,0,0)');
  grd.addColorStop(1, 'rgba(0,5,0,0.5)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function loop() { update(); render(); requestAnimationFrame(loop); }
loop();

</script>
</body>
